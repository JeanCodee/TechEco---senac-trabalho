<body>
<div class="overlay_container">
    <h2 class="titulo">Bem-vindo(a) de volta!</h2>
    <p class="sub-titulo-acesso">acesse conta para continuar</p>
    <button type="submit" class="botao-para-login">Entrar</button>
</div>

<div class="container-cadastro">

    <!-- Seção de cadastro -->

    <h3 class="titulo">crie sua conta</h3>
    <p class="sub-titulo">Cadastre seus dados:</p>

    <form action="/cadastro" method="POST" >
        <label for="nome" class="form-label"> Nome completo:</label><br>
        <i class="fa-regular fa-user"></i><input type="text" id="nome" name="userName" required placeholder="digite seu nome"><br>

        <label for="email" class="form-label"> Email:</label><br>
        <i class="fa-regular fa-envelope"></i><input type="email" id="email" name="userEmail" required placeholder="digite seu e-mail"><br>

        <label for="senha" class="form-label"> senha:</label><br>
        <i class="fa-solid fa-lock"></i><input type="password" id="senha" name="userPassword" required placeholder="digite sua senha"><br>
        <button type="submit" class="botao_cadastro">Cadastrar</button>
    </form>
</div>
