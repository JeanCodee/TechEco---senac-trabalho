<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Cadastro - TechCiclo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/login_cadastro.css">
</head>
<body>
    <main class="container" id="container">
        <div class="form-container sign-up-container">
            <form action="/cadastro" method="POST">
                <h1 class="titulo">Crie sua conta</h1>
                <p class="sub-titulo">Use seu e-mail para registrar</p>
                <div class="input-group">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" name="userName" placeholder="Nome completo" required>
                </div>
                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" name="userEmail" placeholder="E-mail" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="userPassword" placeholder="Senha" required>
                    <i class="fa-solid fa-eye"></i>
                </div>
                <button type="submit" class="btn-main">Cadastrar</button>
            </form>
        </div>

        <div class="form-container sign-in-container">
            <form action="/login" method="POST">
                <h1 class="titulo">Acesse sua conta</h1>
                <p class="sub-titulo">Bem-vindo de volta!</p>
                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" name="userEmail" placeholder="E-mail" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="userPassword" placeholder="Senha" required>
                    <i class="fa-solid fa-eye" id="togglePassword"></i>
                </div>
                <a href="#" class="forgot-password">Esqueceu sua senha?</a>
                <button type="submit" class="btn-main">Entrar</button>
            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h2>Já tem conta?</h2>
                    <p>Faça login para continuar gerenciando suas trocas!</p>
                    <button class="btn-main" id="signIn">Entrar</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h2>Ainda não possue uma conta?</h2>
                    <p>Cadastre-se e comece a trocar seus dispositivos eletrônicos!</p>
                    <button class="btn-main" id="signUp">Cadastrar</button>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/login_cadastro.js"></script>
</body>
</html>
