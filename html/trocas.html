<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="/css/trocas.css">
    <title>Document</title>
</head>
<body>
    <header>

        <h1>TechCiclo</h1>

    <div class="card-content">

    <div class="usuario">    
        <icon class="usuarios">Nome de usuário</icon><br> <i class="fa-solid fa-circle-user"></i>
        <button>Loguin ou entrar</button>
        
    </div>    
 
    </header>
<body>
    <h2>Troca de produtos</h2>
    <p>Solicite a troca do seu produto aqui</p>
<div class="formulario">
    <form action="/troca" method="POST">
        <label for="produto"> Produto:</label>
        <input type="text" id="produto" name="produto" required placeholder="digite o nome do produto"><br>

        <button type="submit">Solicitar Troca</button>
    </form>  
</div>  


    <section class="servicos">
      <div class="cards">

        <div class="card">
            <i class="fa-solid fa-gamepad"> </i>
        </div>
        <div class="card">
            <i class="fa-solid fa-desktop"> </i>
        </div>
        <div class="card">
            <i class="fa-solid fa-mobile"> </i>
        </div>
        <div class="card">
            <i class="fa-solid fa-headphones"></i>
        </div> 

        </div>
    </section>

    <section class="cardes-de-troca">
        <h2>Itens disponíveis para troca:</h2>
        <ul class="trocas">
            <li>Notbook</li>
            <li>Smaertphone</li>
            <li>Pc de mesa</li>
            <li>HD</li>
        </ul>

    </section>
    
</body>
</html>
