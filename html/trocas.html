<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/trocas.css">
    <title>TechCiclo - Trocas</title>
</head>
<body>
    <header>
        <h1>TechCiclo</h1>
        <div class="usuario">    
            <span class="nome-usuario">Nome de usuário</span>
            <i class="fa-solid fa-circle-user"></i>
            <button class="btn-login">Login ou entrar</button>
        </div>    
    </header>

    <main class="container">
        <section class="boas-vindas">
            <h2>Troca de produtos</h2>
            <p>Solicite a troca do seu produto aqui</p>
        </section>

        <section class="form-section">
            <form action="/troca" method="POST" class="troca-form">
                <label for="produto">Produto:</label>
                <div class="input-group">
                    <input type="text" id="produto" name="produto" required placeholder="Digite o nome do produto">
                    <button type="submit">Solicitar Troca</button>
                </div>
            </form>  
        </section>

        <div class="cards-icones">
            <div class="card"><i class="fa-solid fa-gamepad" style="color: rgb(248, 249, 249);"></i></div>
            <p>Games</p>
            <div class="card"><i class="fa-solid fa-computer" style="color: rgb(248, 249, 249);"></i></div>
            <p>Computador</p>
            <div class="card"><i class="fa-solid fa-mobile" style="color: rgb(248, 249, 249);"></i></div>
            <p>Celular</p>
            <div class="card"><i class="fa-solid fa-headphones" style="color: rgb(248, 249, 249);"></i></div>
            <p>Acessórios</p> 
        </div>

        <section class="itens-disponiveis">
            <h2>Itens disponíveis para troca:</h2>
            <ul class="lista-trocas">
                <li><i class="fa-solid fa-check"></i> Notebook</li>
                <li><i class="fa-solid fa-check"></i> Smartphone</li>
                <li><i class="fa-solid fa-check"></i> PC de mesa</li>
                <li><i class="fa-solid fa-check"></i> HD</li>
            </ul>
        </section>

    </main>

    <section class="card-img">
        <article class="item">
            <img src="/img/baixados (1).jpg" class="imagem">
            <p>Preço: xx</p>
        </article>

        <div>
            <button>Informações do produto</button>
        </div>

        <article class="item">
            <img src="/img/baixados.jpg" class="imagem">
            <p>Preço: xx</p>
        </article>
        <div>
            <button>Informações do produto</button>
        </div>


        <article class="item">
            <img src="/img/Blackbook.jpg" class="imagem">
            <p>Preço: xx</p>
        </article>
        <div>
            <button>Informações do produto</button>
        </div>

        <article class="item">
            <img src="/img/Dell Optiplex 9020 Desktop Computer.jpg" class="imagem">
            <p>Preço: xx</p>
        
        </article>
        <div>
            <button>Informações do produto</button>
        </div>
    </section>

        <form action="/troca" method="POST" class="trocas">
            <label for="contato">Formulário de contato:</label><br>
            <input type="text" id="Identidade" placeholder="Digite seu nome" requerid>
            <input type="text" id="Email" placeholder="Digte seu email">
            <input type="text" id="Mensagem" placeholder="Mensagem">
        </form>
    </section> -->

<footer>
     <p>@2026 TechCiclo</p>
</footer> 

<script src="/js/trocas.js"></script>
    
</body>
</html>
